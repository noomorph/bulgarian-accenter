name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  # data/stress-dict.txt is generated, not committed. Fetch the mirrored copy from our own
  # `dictionary` release and hand it to every job that needs it.
  #
  # We deliberately do NOT rebuild from the upstream dump here. rechnik.chitanka.info blocks
  # datacenter IPs (Actions gets a 403) — and they are right to: it is a 70 MB file they serve for
  # free, and pulling it on every push is exactly the abuse that block exists to stop. So we
  # mirror it once and pin the hash. `npm run dict:fetch` refuses any copy that does not match
  # data/stress-dict.sha256, which is the hash a from-source build produces — so the mirror cannot
  # silently drift from what `npm run dict:all` would give you.
  dictionary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run dict:fetch

      - uses: actions/upload-artifact@v7
        with:
          name: dictionary
          path: data/stress-dict.txt
          retention-days: 1
          if-no-files-found: error

  test:
    needs: dictionary
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: dictionary
          path: data

      # With the dictionary present, this includes the invariants asserted over every one of the
      # 422k entries: stripping the marks returns the key, no mark lands anywhere but on a vowel,
      # every key is a single Cyrillic token, and no derived entry overrules an attested one.
      # They are why a corrupt dictionary cannot render an accent on a consonant. On a bare clone
      # they skip; here they must not.
      - run: npm test

      - name: Fail if the dictionary guards were skipped
        run: npm test 2>&1 | grep -q "skipped 0" || {
          echo "::error::the shipped-dictionary invariants did not run"; exit 1; }

  extension:
    needs: dictionary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: dictionary
          path: data

      - run: npm run build:zip

      # AMO's own linter. Running it here means a store-policy violation shows up as a red X on a
      # pull request, and not as a rejection email three days after submission.
      - name: Lint the Firefox build (AMO linter)
        run: npx web-ext lint --source-dir dist/firefox

      # So a reviewer can load-unpacked any PR without building the dictionary themselves.
      - uses: actions/upload-artifact@v7
        with:
          name: extension-zips
          path: dist/*.zip
          if-no-files-found: error
