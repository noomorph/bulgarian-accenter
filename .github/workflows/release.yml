name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Existing release tag to rebuild, e.g. v1.0.1. Only rebuilds and (re)publishes to
          Firefox — github-release and publish-chrome only ever run on the tag push, so this
          can't double-submit to the Chrome Web Store or touch an already-published GitHub
          release. Use it to retry a failed AMO submission without re-tagging.
        required: true

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      # The tag is the single source of truth for the version. If package.json disagrees, the
      # two store listings would disagree with each other, and that is not something you want to
      # discover after publishing.
      - name: Verify the tag matches package.json
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$pkg" != "${RELEASE_TAG}" ]; then
            echo "::error::tag ${RELEASE_TAG} != package.json ${pkg}"
            exit 1
          fi

      - name: Verify CHANGELOG has an entry for this version
        run: grep -q "## \[${RELEASE_TAG#v}\]" CHANGELOG.md || {
          echo "::error::CHANGELOG.md has no section for ${RELEASE_TAG#v}"; exit 1; }

      # The dictionary is generated, not committed. Take the hash-pinned mirror rather than
      # rebuilding from upstream — see the note in ci.yml.
      - run: npm run dict:fetch

      - run: npm test
      - run: npm run build:zip
      - run: npx web-ext lint --source-dir dist/firefox

      # Attached to the release so the dictionary is always retrievable, even if the upstream dump
      # (a 2013 file on a site that has been raided before) one day stops being downloadable. A
      # release asset can also be *removed* on a takedown request — which git history cannot.
      - name: Attach the built dictionary
        run: cp data/stress-dict.txt "dist/stress-dict-${RELEASE_TAG}.txt"

      # AMO requires human-readable source when a shipped file is generated — and
      # data/stress-dict.txt is: a reviewer opening it sees `8ове:3`, not Bulgarian. This archive
      # is the answer, and it is attached to every release whether AMO asks or not. It is a clean
      # `git archive` of the tag, which — now that the dictionary is not committed — contains
      # exactly the scripts that build it and nothing generated. `npm run dict:all` reproduces the
      # shipped file byte for byte from the public dump pinned in data/PROVENANCE.json.
      - name: Package source for AMO review
        run: git archive --format=zip --output="dist/source-${RELEASE_TAG}.zip" HEAD

      - uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            dist/*.zip
            dist/*.txt
          if-no-files-found: error

  github-release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.zip
            dist/*.txt
          generate_release_notes: true
          draft: true # published by hand, after the store submissions are in

  publish-chrome:
    needs: build
    # The owner guard is what lets this file live byte-for-byte unchanged in a fork. A fork holds no
    # secrets and no environments — GitHub does not copy either — so without this the job would go
    # red for anyone who forked the repo. Skipped is the honest outcome, not failed.
    #
    # The corollary is deliberate: transferring this repo to an organisation *stops* store publishing
    # rather than handing the stores to whoever owns that organisation. Re-enabling it is an edit
    # someone has to make on purpose.
    if: github.event_name == 'push' && github.repository_owner == 'noomorph'
    runs-on: ubuntu-latest
    # A protected environment, not repo-wide secrets: a fork's pull request must never be able to
    # see these, and a store push wants a human on the button.
    environment: chrome-web-store
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist
      # Deliberately no subcommand. v4 dropped `--auto-publish`, and a bare invocation is what now
      # uploads *and* publishes. Spelling `upload` here would still succeed, still be green, and
      # simply never ship the version — it would sit staged in the dashboard forever.
      - name: Upload to the Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          : "${PUBLISHER_ID:?add CWS_PUBLISHER_ID to the chrome-web-store environment (Developer Dashboard -> Settings)}"
          npx --yes chrome-webstore-upload-cli@4 \
            --source "dist/bulgarian-accenter-chrome-${GITHUB_REF_NAME#v}.zip"

  publish-firefox:
    needs: build
    if: github.repository_owner == 'noomorph' # see publish-chrome
    runs-on: ubuntu-latest
    environment: addons-mozilla-org
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist
      # Reuse the zip the `build` job already produced and AMO-linted, rather than rebuilding:
      # a fresh `npm run build` here has no dictionary to build from (only the zips were carried
      # over as artifacts) and would just re-derive a tree that's already sitting in the zip.
      - name: Unpack the already-built Firefox extension
        run: |
          mkdir -p dist/firefox
          unzip -q "dist/bulgarian-accenter-firefox-${RELEASE_TAG#v}.zip" -d dist/firefox
      - name: Sign and submit to AMO
        run: |
          npx web-ext sign \
            --source-dir dist/firefox \
            --channel listed \
            --upload-source-code "dist/source-${RELEASE_TAG}.zip" \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET"
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
